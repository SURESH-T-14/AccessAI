services:
  # Node.js Backend Service
  - type: web
    name: accessai-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: FIREBASE_DATABASE_URL
        scope: build,runtime
      - key: OPENAI_API_KEY
        scope: runtime
        isSecret: true
      - key: VITE_GEMINI_API_KEY
        scope: runtime
        isSecret: true
      - key: VITE_HUGGINGFACE_API_KEY
        scope: runtime
        isSecret: true
      - key: VITE_GOOGLE_CUSTOM_SEARCH_ENGINE_ID
        scope: runtime
      - key: MONGODB_URI
        scope: runtime
        isSecret: true
      - key: EMAIL_USER
        scope: runtime
        isSecret: true
      - key: EMAIL_PASSWORD
        scope: runtime
        isSecret: true
      - key: TWILIO_ACCOUNT_SID
        scope: runtime
        isSecret: true
      - key: TWILIO_AUTH_TOKEN
        scope: runtime
        isSecret: true
      - key: TWILIO_PHONE_NUMBER
        scope: runtime
      - key: ESP32_IP
        scope: runtime
      - key: ESP32_PORT
        scope: runtime
      - key: NODE_ENV
        value: production
    repo: https://github.com/SURESH-T-14/AccessAI

  # Python Backend Service (Gesture Recognition)
  - type: web
    name: accessai-python
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:5000 gesture_api_server_lite:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
    repo: https://github.com/SURESH-T-14/AccessAI

  # Frontend Service
  - type: web
    name: accessai-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: accessai-backend
          type: web
          property: url
      - key: VITE_FLASK_API_URL
        fromService:
          name: accessai-python
          type: web
          property: url
      - key: VITE_FIREBASE_API_KEY
        scope: build,runtime
        isSecret: true
      - key: VITE_FIREBASE_AUTH_DOMAIN
        scope: build,runtime
      - key: VITE_FIREBASE_PROJECT_ID
        scope: build,runtime
      - key: VITE_FIREBASE_STORAGE_BUCKET
        scope: build,runtime
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        scope: build,runtime
      - key: VITE_FIREBASE_APP_ID
        scope: build,runtime
      - key: VITE_GEMINI_API_KEY
        scope: build,runtime
        isSecret: true
      - key: VITE_HUGGINGFACE_API_KEY
        scope: build,runtime
        isSecret: true
      - key: VITE_GOOGLE_CUSTOM_SEARCH_ENGINE_ID
        scope: build,runtime
    repo: https://github.com/SURESH-T-14/AccessAI
