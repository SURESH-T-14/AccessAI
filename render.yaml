services:
  # Node.js Backend Service
  - type: web
    name: accessai-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: FIREBASE_DATABASE_URL
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: VITE_GEMINI_API_KEY
        value: ""
      - key: VITE_HUGGINGFACE_API_KEY
        value: ""
      - key: VITE_GOOGLE_CUSTOM_SEARCH_ENGINE_ID
        value: ""
      - key: MONGODB_URI
        value: ""
      - key: EMAIL_USER
        value: ""
      - key: EMAIL_PASSWORD
        value: ""
      - key: TWILIO_ACCOUNT_SID
        value: ""
      - key: TWILIO_AUTH_TOKEN
        value: ""
      - key: TWILIO_PHONE_NUMBER
        value: ""
      - key: ESP32_IP
        value: "http://192.168.29.103"
      - key: ESP32_PORT
        value: "80"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

  # Python Backend Service (Gesture Recognition)
  - type: web
    name: accessai-python
    env: python
    plan: free
    buildCommand: pip install --prefer-binary --no-cache-dir --upgrade pip setuptools wheel && pip install --prefer-binary --no-cache-dir -r requirements.txt
    startCommand: python gesture_api_server_simple.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "5000"

  # Frontend Service
  - type: web
    name: accessai-frontend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_BASE_URL
        value: ""
      - key: VITE_FLASK_API_URL
        value: ""
      - key: VITE_FIREBASE_API_KEY
        value: ""
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: ""
      - key: VITE_FIREBASE_PROJECT_ID
        value: ""
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: ""
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: ""
      - key: VITE_FIREBASE_APP_ID
        value: ""
      - key: VITE_GEMINI_API_KEY
        value: ""
      - key: VITE_HUGGINGFACE_API_KEY
        value: ""
      - key: VITE_GOOGLE_CUSTOM_SEARCH_ENGINE_ID
        value: ""
